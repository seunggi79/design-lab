<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YZY — FIT ROOM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap">
<style>
/* ── YEEZY Design Tokens ── */
:root {
  --black: #000000;
  --white: #ffffff;
  --grey-90: #111111;
  --grey-70: #3a3a3a;
  --grey-50: #767676;
  --grey-30: #b3b3b3;
  --grey-15: #d8d8d8;
  --grey-08: #ededed;
  --font-mono: "IBM Plex Mono", ui-monospace, "SFMono-Regular", Menlo, monospace;
  --font: var(--font-mono);
  --ease: cubic-bezier(0.2, 0, 0, 1);
  --dur-fast: 120ms;
  --dur-base: 200ms;
}

html, body { margin: 0; background: #fff; }
*, *::before, *::after { box-sizing: border-box; }
button { font-family: var(--font-mono); }

.fit-root {
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: #fff;
  font-family: var(--font-mono);
  color: #000;
  display: flex;
  flex-direction: column;
}
.fit-body {
  display: grid;
  grid-template-columns: 1fr 384px;
  min-height: 0;
  flex: 1;
}
.fit-stage {
  border-right: 1px solid #000;
  position: relative;
  display: flex;
  flex-direction: column;
  min-height: 0;
  min-width: 0;
  overflow: hidden;
}
.fit-panel {
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.fit-scroll { flex: 1; overflow-y: auto; }
.yzy-grab { cursor: grab; }
.yzy-grab:active { cursor: grabbing; }
.yzy-grab canvas { display: block; width: 100%; height: 100%; }
.row-hit { transition: background var(--dur-fast) var(--ease); }
.row-hit:hover { background: var(--grey-08); }

@media (max-width: 880px) {
  .fit-root { height: auto; min-height: 100vh; overflow: visible; }
  .fit-body { grid-template-columns: 1fr; }
  .fit-stage { border-right: none; border-bottom: 1px solid #000; min-height: 62vh; }
  .fit-panel { max-height: none; }
  .fit-panel .fit-scroll { overflow: visible; }
}
@media (max-width: 560px) {
  .fit-stage { min-height: 54vh; }
}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
"use strict";
const { useState, useEffect, useRef, useCallback, useImperativeHandle, forwardRef } = React;

/* ── NavBar ──────────────────────────────────────────── */
function IconButton({ children, label, size = 24, onClick, style }) {
  return React.createElement("button", {
    type: "button", "aria-label": label, onClick,
    style: {
      appearance: "none", background: "transparent", border: "none", borderRadius: 0,
      width: size, height: size, display: "inline-flex", alignItems: "center",
      justifyContent: "center", padding: 0, cursor: "pointer",
      fontFamily: "var(--font-mono)", fontSize: Math.round(size * 0.8),
      fontWeight: 400, lineHeight: 1, color: "var(--black)",
      transition: "opacity var(--dur-fast) var(--ease)", ...style
    },
    onMouseEnter: e => e.currentTarget.style.opacity = "0.4",
    onMouseLeave: e => e.currentTarget.style.opacity = "1"
  }, children);
}

function NavBar({ items = [], active, cartCount = 0, onCart }) {
  return React.createElement("nav", {
    style: {
      display: "grid", gridTemplateColumns: "1fr auto 1fr",
      alignItems: "center", padding: "16px 20px", fontFamily: "var(--font-mono)"
    }
  },
    React.createElement("div", { style: { justifySelf: "start" } },
      React.createElement(IconButton, { label: "Toggle density" }, "+")
    ),
    React.createElement("div", {
      style: { display: "flex", gap: "20px", justifySelf: "center", flexWrap: "wrap", justifyContent: "center" }
    },
      items.map(it =>
        React.createElement("button", {
          key: it, type: "button",
          style: {
            appearance: "none", background: "transparent", border: "none", padding: 0,
            cursor: active === it ? "default" : "pointer",
            fontFamily: "var(--font-mono)", fontSize: "11px",
            letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--black)",
            opacity: active === it ? 0.4 : 1,
            transition: "opacity var(--dur-fast) var(--ease)"
          },
          onMouseEnter: e => { if (active !== it) e.currentTarget.style.opacity = "0.4"; },
          onMouseLeave: e => { e.currentTarget.style.opacity = active === it ? "0.4" : "1"; }
        }, it)
      )
    ),
    React.createElement("div", { style: { justifySelf: "end" } },
      React.createElement("button", {
        type: "button", onClick: onCart,
        style: {
          appearance: "none", background: "transparent", border: "none", cursor: "pointer",
          fontFamily: "var(--font-mono)", fontSize: "11px",
          letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--black)"
        }
      }, `BAG (${cartCount})`)
    )
  );
}

/* ── Three.js helpers ────────────────────────────────── */
function buildMannequin(THREE) {
  const grp = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color: 0xf2f2f3, transparent: true, opacity: 0.34,
    roughness: 0.35, metalness: 0.0, depthWrite: false
  });
  const add = (geo, x, y, z, sz, sy) => {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    if (sz != null) m.scale.z = sz;
    if (sy != null) m.scale.y = sy;
    m.renderOrder = 0;
    grp.add(m);
    return m;
  };
  add(new THREE.SphereGeometry(0.33, 40, 28), 0, 1.42, 0, 0.92);
  add(new THREE.CylinderGeometry(0.13, 0.15, 0.26, 24), 0, 1.08, 0, 0.85);
  add(new THREE.CylinderGeometry(0.47, 0.33, 1.02, 40), 0, 0.46, 0, 0.66);
  add(new THREE.CylinderGeometry(0.34, 0.30, 0.42, 32), 0, -0.18, 0, 0.74);
  const armL = add(new THREE.CylinderGeometry(0.11, 0.092, 1.18, 22), -0.52, 0.34, 0, 0.95);
  armL.rotation.z = 0.05;
  const armR = add(new THREE.CylinderGeometry(0.11, 0.092, 1.18, 22), 0.52, 0.34, 0, 0.95);
  armR.rotation.z = -0.05;
  add(new THREE.SphereGeometry(0.10, 20, 16), -0.55, -0.30, 0, 0.9);
  add(new THREE.SphereGeometry(0.10, 20, 16), 0.55, -0.30, 0, 0.9);
  add(new THREE.CylinderGeometry(0.185, 0.13, 1.3, 28), -0.20, -1.02, 0, 0.8);
  add(new THREE.CylinderGeometry(0.185, 0.13, 1.3, 28), 0.20, -1.02, 0, 0.8);
  add(new THREE.SphereGeometry(0.16, 18, 14), -0.20, -1.66, 0.06, 0.7, 0.6);
  add(new THREE.SphereGeometry(0.16, 18, 14), 0.20, -1.66, 0.06, 0.7, 0.6);
  grp.renderOrder = 0;
  return grp;
}

function buildGarment(THREE, id) {
  const grp = new THREE.Group();
  grp.renderOrder = 2;
  const leather = () => new THREE.MeshPhysicalMaterial({ color: 0x0b0b0b, roughness: 0.34, metalness: 0.1, clearcoat: 0.7, clearcoatRoughness: 0.35 });
  const knit = () => new THREE.MeshStandardMaterial({ color: 0x161616, roughness: 0.95, metalness: 0 });
  const nylon = () => new THREE.MeshPhysicalMaterial({ color: 0x0d0d0d, roughness: 0.4, metalness: 0.12, clearcoat: 0.4, clearcoatRoughness: 0.25 });
  const rubber = () => new THREE.MeshStandardMaterial({ color: 0x070707, roughness: 0.55, metalness: 0.05 });
  const add = (geo, mat, x, y, z, rz, sz) => {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x, y, z);
    if (rz) m.rotation.z = rz;
    if (sz != null) m.scale.z = sz;
    grp.add(m);
    return m;
  };
  if (id === 'TS') {
    add(new THREE.CylinderGeometry(0.5, 0.4, 1.02, 40), knit(), 0, 0.3, 0, 0, 0.72);
  } else if (id === 'JC') {
    const m = leather();
    add(new THREE.CylinderGeometry(0.62, 0.52, 1.32, 44), m, 0, 0.34, 0, 0, 0.82);
    add(new THREE.CapsuleGeometry(0.17, 0.92, 10, 18), m, -0.56, 0.3, 0, 0.12, 0.95);
    add(new THREE.CapsuleGeometry(0.17, 0.92, 10, 18), m, 0.56, 0.3, 0, -0.12, 0.95);
    add(new THREE.SphereGeometry(0.3, 28, 20), m, 0, 0.95, -0.1, 0, 0.85);
  } else if (id === 'WP') {
    const m = nylon();
    add(new THREE.CylinderGeometry(0.35, 0.31, 0.5, 32), m, 0, -0.2, 0, 0, 0.8);
    add(new THREE.CapsuleGeometry(0.2, 1.02, 8, 22), m, -0.2, -1.02, 0, 0, 0.85);
    add(new THREE.CapsuleGeometry(0.2, 1.02, 8, 22), m, 0.2, -1.02, 0, 0, 0.85);
  } else if (id === 'SL') {
    const m = rubber();
    [-0.2, 0.2].forEach(x => {
      add(new THREE.CylinderGeometry(0.2, 0.19, 0.52, 26), m, x, -1.5, 0, 0, 1);
      add(new THREE.SphereGeometry(0.21, 20, 16), m, x, -1.74, 0.13, 0, 0.82);
    });
  } else if (id === 'SG') {
    const m = new THREE.MeshPhysicalMaterial({ color: 0x000000, roughness: 0.12, metalness: 0.3, clearcoat: 1 });
    add(new THREE.BoxGeometry(0.48, 0.14, 0.07), m, 0, 1.42, 0.30, 0, 1);
    add(new THREE.BoxGeometry(0.04, 0.07, 0.22), m, -0.24, 1.42, 0.2, 0, 1);
    add(new THREE.BoxGeometry(0.04, 0.07, 0.22), m, 0.24, 1.42, 0.2, 0, 1);
  }
  return grp;
}

/* ── Scene ───────────────────────────────────────────── */
const Scene = forwardRef(function Scene({ worn, onYawChange }, ref) {
  const mountRef = useRef(null);
  const s = useRef({ rotY: 0, rotX: 0, drag: false, alive: true, meshes: {} });

  useImperativeHandle(ref, () => ({
    reset() {
      s.current.rotY = 0;
      s.current.rotX = 0;
      onYawChange(0);
    }
  }));

  useEffect(() => {
    const el = mountRef.current;
    if (!el) return;
    const THREE = window.THREE;
    const W = el.clientWidth || 600, H = el.clientHeight || 800;
    const st = s.current;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(W, H, false); // false = don't set canvas CSS style
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.domElement.style.cssText = 'display:block;width:100%;height:100%;';
    el.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(30, W / H, 0.1, 100);
    camera.position.set(0, 0.05, 7.6);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.HemisphereLight(0xffffff, 0xcfcfcf, 0.75));
    const key = new THREE.DirectionalLight(0xffffff, 1.15); key.position.set(2.5, 4, 5); scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.45); fill.position.set(-4, 1, 2); scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.7); rim.position.set(-1, 2, -5); scene.add(rim);

    const figure = new THREE.Group();
    scene.add(figure);
    figure.add(buildMannequin(THREE));
    st.figure = figure;

    ['SG', 'JC', 'TS', 'WP', 'SL'].forEach(id => {
      const g = buildGarment(THREE, id);
      st.meshes[id] = g;
      figure.add(g);
    });

    const onDown = (e) => {
      st.drag = true; st.px = e.clientX; st.py = e.clientY;
      st.sy = st.rotY; st.sx = st.rotX;
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
    };
    const onMove = (e) => {
      if (!st.drag) return;
      st.rotY = Math.max(-0.95, Math.min(0.95, st.sy + (e.clientX - st.px) * 0.008));
      st.rotX = Math.max(-0.22, Math.min(0.22, st.sx + (e.clientY - st.py) * 0.004));
      onYawChange(Math.round(st.rotY * 180 / Math.PI));
    };
    const onUp = () => {
      st.drag = false;
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    };
    el.addEventListener('pointerdown', onDown);

    const onResize = () => {
      const w = el.clientWidth, h = el.clientHeight;
      if (!w || !h) return;
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };
    window.addEventListener('resize', onResize);
    const ro = window.ResizeObserver ? new ResizeObserver(onResize) : null;
    if (ro) ro.observe(el);

    let rafId;
    const loop = () => {
      if (!st.alive) return;
      rafId = requestAnimationFrame(loop);
      figure.rotation.y = st.rotY;
      figure.rotation.x = st.rotX;
      renderer.render(scene, camera);
    };
    loop();

    return () => {
      st.alive = false;
      cancelAnimationFrame(rafId);
      el.removeEventListener('pointerdown', onDown);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('resize', onResize);
      if (ro) ro.disconnect();
      renderer.dispose();
      if (el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, []);

  useEffect(() => {
    const st = s.current;
    Object.entries(worn).forEach(([id, v]) => {
      if (st.meshes[id]) st.meshes[id].visible = !!v;
    });
  }, [worn]);

  return React.createElement("div", {
    ref: mountRef,
    className: "yzy-grab",
    style: { flex: 1, width: "100%", minHeight: 0, position: "relative", touchAction: "none", userSelect: "none" }
  });
});

/* ── Data ────────────────────────────────────────────── */
const ITEMS = [
  { id: 'SG', code: 'SG-03', slot: 'EYEWEAR', price: 300 },
  { id: 'JC', code: 'JC-04', slot: 'OUTER',   price: 1200 },
  { id: 'TS', code: 'TS-01', slot: 'BASE',    price: 110 },
  { id: 'WP', code: 'WP-01', slot: 'LOWER',   price: 200 },
  { id: 'SL', code: 'SL-03', slot: 'FOOT',    price: 400 }
];

/* ── Button helpers ──────────────────────────────────── */
function Btn({ children, onClick, black = false, style }) {
  const base = {
    appearance: "none", cursor: "pointer", fontFamily: "var(--font-mono)",
    textTransform: "uppercase", letterSpacing: ".08em", padding: "12px",
    border: "1px solid #000", borderRadius: 0,
    background: black ? "#000" : "transparent",
    color: black ? "#fff" : "#000",
    fontSize: black ? "12px" : "11px",
    transition: "background var(--dur-fast) var(--ease), opacity var(--dur-fast) var(--ease)",
    ...style
  };
  return React.createElement("button", {
    type: "button", onClick,
    style: base,
    onMouseEnter: e => { e.currentTarget.style[black ? "background" : "opacity"] = black ? "#111" : "0.55"; },
    onMouseLeave: e => { e.currentTarget.style[black ? "background" : "opacity"] = black ? "#000" : "1"; }
  }, children);
}

/* ── App ─────────────────────────────────────────────── */
function FitRoom() {
  const [worn, setWorn] = useState({ SG: true, JC: true, TS: true, WP: true, SL: true });
  const [saved, setSaved] = useState(() => {
    try { const r = localStorage.getItem('yzy_fitroom_looks'); return r ? JSON.parse(r) : []; } catch { return []; }
  });
  const [yaw, setYaw] = useState(0);
  const sceneRef = useRef(null);

  const persist = useCallback((list) => {
    try { localStorage.setItem('yzy_fitroom_looks', JSON.stringify(list)); } catch {}
  }, []);

  const toggle = (id) => setWorn(w => ({ ...w, [id]: !w[id] }));
  const setAll = (v) => { const w = {}; ITEMS.forEach(it => w[it.id] = v); setWorn(w); };

  const saveLook = () => {
    const ids = ITEMS.filter(it => worn[it.id]).map(it => it.id);
    if (!ids.length) return;
    const label = 'L' + String(saved.length + 1).padStart(2, '0') + ' · ' + ids.length;
    const next = [...saved, { id: Date.now(), label, worn: { ...worn } }];
    persist(next); setSaved(next);
  };

  const removeSaved = (id) => {
    const next = saved.filter(x => x.id !== id);
    persist(next); setSaved(next);
  };

  const resetView = () => sceneRef.current && sceneRef.current.reset();

  const wornItems = ITEMS.filter(it => worn[it.id]);
  const total = wornItems.reduce((s, it) => s + it.price, 0);
  const yawLabel = `YAW ${yaw > 0 ? '+' : ''}${yaw}°`;

  const ghostBtn = {
    appearance: "none", background: "transparent", border: "none", cursor: "pointer",
    fontFamily: "var(--font-mono)", padding: 0,
    transition: "opacity var(--dur-fast) var(--ease)"
  };

  return React.createElement("div", { className: "fit-root" },

    /* ── NavBar ── */
    React.createElement("div", { style: { borderBottom: "1px solid #000" } },
      React.createElement(NavBar, { items: ['ARCHIVE', 'FIT ROOM', 'DROP'], active: "FIT ROOM", cartCount: saved.length })
    ),

    /* ── Body ── */
    React.createElement("div", { className: "fit-body" },

      /* ── Stage ── */
      React.createElement("section", { className: "fit-stage" },

        /* top label row */
        React.createElement("div", {
          style: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "18px 28px 10px" }
        },
          React.createElement("span", { style: { fontSize: "10px", letterSpacing: ".16em", textTransform: "uppercase", color: "#767676" } }, "FIG. 01 — VOLUME / GLTF"),
          React.createElement("span", { style: { fontSize: "10px", letterSpacing: ".16em", textTransform: "uppercase", color: "#767676" } }, yawLabel)
        ),

        /* 3D canvas */
        React.createElement(Scene, { ref: sceneRef, worn, onYawChange: setYaw }),

        /* bottom bar */
        React.createElement("div", {
          style: { display: "flex", alignItems: "center", justifyContent: "center", gap: "18px", padding: "12px 0 16px", borderTop: "1px solid #ededed" }
        },
          React.createElement("span", { style: { fontSize: "10px", letterSpacing: ".2em", textTransform: "uppercase", color: "#b3b3b3" } }, "‹ DRAG TO ROTATE ›"),
          React.createElement("button", {
            type: "button", onClick: resetView,
            style: { ...ghostBtn, fontSize: "10px", letterSpacing: ".16em", textTransform: "uppercase", color: "#000" },
            onMouseEnter: e => e.currentTarget.style.opacity = "0.45",
            onMouseLeave: e => e.currentTarget.style.opacity = "1"
          }, "RESET VIEW")
        )
      ),

      /* ── Panel ── */
      React.createElement("aside", { className: "fit-panel" },

        /* panel heading */
        React.createElement("div", { style: { padding: "22px 24px 16px", borderBottom: "1px solid #000" } },
          React.createElement("div", { style: { fontSize: "13px", letterSpacing: ".18em", textTransform: "uppercase" } }, "DRESSING ROOM"),
          React.createElement("div", { style: { fontSize: "10px", letterSpacing: ".12em", textTransform: "uppercase", color: "#767676", marginTop: "6px" } }, "TAP AN ITEM TO WEAR / REMOVE")
        ),

        /* items */
        React.createElement("div", { className: "fit-scroll" },
          ITEMS.map(it =>
            React.createElement("div", {
              key: it.id,
              className: "row-hit",
              onClick: () => toggle(it.id),
              style: {
                display: "grid", gridTemplateColumns: "14px 1fr auto",
                alignItems: "center", gap: "14px", padding: "18px 24px",
                borderBottom: "1px solid #ededed", cursor: "pointer"
              }
            },
              React.createElement("span", {
                style: {
                  display: "block", width: "12px", height: "12px",
                  border: "1px solid #000",
                  background: worn[it.id] ? "#000" : "transparent"
                }
              }),
              React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: "3px" } },
                React.createElement("span", { style: { fontSize: "13px", letterSpacing: ".12em", transition: "opacity .15s", opacity: worn[it.id] ? 1 : 0.4 } }, it.code),
                React.createElement("span", { style: { fontSize: "9px", letterSpacing: ".14em", textTransform: "uppercase", color: "#b3b3b3" } }, it.slot)
              ),
              React.createElement("div", { style: { display: "flex", flexDirection: "column", alignItems: "flex-end", gap: "3px" } },
                React.createElement("span", { style: { fontSize: "11px", letterSpacing: ".08em", color: worn[it.id] ? "#000" : "#b3b3b3" } }, worn[it.id] ? "WORN" : "REMOVED"),
                React.createElement("span", { style: { fontSize: "10px", letterSpacing: ".06em", color: "#767676" } }, "$" + it.price)
              )
            )
          )
        ),

        /* bottom actions */
        React.createElement("div", { style: { borderTop: "1px solid #000", padding: "18px 24px", display: "flex", flexDirection: "column", gap: "14px" } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "baseline" } },
            React.createElement("span", { style: { fontSize: "10px", letterSpacing: ".16em", textTransform: "uppercase", color: "#767676" } }, `${wornItems.length} WORN`),
            React.createElement("span", { style: { fontSize: "14px", letterSpacing: ".08em" } }, `$${total}`)
          ),
          React.createElement("div", { style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" } },
            React.createElement(Btn, { onClick: () => setAll(true) }, "FULL LOOK"),
            React.createElement(Btn, { onClick: () => setAll(false) }, "REMOVE ALL")
          ),
          React.createElement(Btn, { black: true, onClick: saveLook, style: { padding: "14px" } }, "SAVE LOOK")
        ),

        /* saved looks */
        React.createElement("div", { style: { borderTop: "1px solid #000", padding: "16px 24px 20px" } },
          React.createElement("div", { style: { fontSize: "10px", letterSpacing: ".16em", textTransform: "uppercase", color: "#767676", marginBottom: "12px" } }, `SAVED — ${saved.length}`),
          saved.length > 0
            ? React.createElement("div", { style: { display: "flex", flexWrap: "wrap", gap: "8px" } },
                saved.map(lk =>
                  React.createElement("div", {
                    key: lk.id,
                    style: { display: "flex", alignItems: "center", gap: "8px", border: "1px solid #000", padding: "7px 10px" }
                  },
                    React.createElement("button", {
                      type: "button", onClick: () => setWorn({ ...lk.worn }),
                      style: { ...ghostBtn, fontSize: "10px", letterSpacing: ".1em" },
                      onMouseEnter: e => e.currentTarget.style.opacity = "0.45",
                      onMouseLeave: e => e.currentTarget.style.opacity = "1"
                    }, lk.label),
                    React.createElement("button", {
                      type: "button", onClick: () => removeSaved(lk.id),
                      style: { ...ghostBtn, fontSize: "11px", lineHeight: 1, color: "#767676" },
                      onMouseEnter: e => e.currentTarget.style.opacity = "0.45",
                      onMouseLeave: e => e.currentTarget.style.opacity = "1"
                    }, "×")
                  )
                )
              )
            : React.createElement("div", { style: { fontSize: "10px", letterSpacing: ".1em", textTransform: "uppercase", color: "#d8d8d8" } }, "NO LOOKS SAVED")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FitRoom));
</script>
</body>
</html>
