document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

icode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6630fc5b-1b4e-4ce8-a16b-fdc599b1ea70\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4837bb6b-741b-4f22-b733-4cbf24174655\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2de351e6-cacb-47c6-954e-6855eb36c1b9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2ea3b792-e5b7-4894-b7db-f35f0298daa0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   YEEZY — Color\n   A strict monochrome system. Black on white, nothing else.\n   Color enters ONLY through product imagery, never through UI.\n   ============================================================ */\n\n:root {\n  /* --- Base scale (the only two real colors) --- */\n  --black: #000000;\n  --white: #ffffff;\n\n  /* --- Greys: used sparingly for disabled / hairline states only --- */\n  --grey-90: #111111;\n  --grey-70: #3a3a3a;\n  --grey-50: #767676;\n  --grey-30: #b3b3b3;\n  --grey-15: #d8d8d8;\n  --grey-08: #ededed;\n\n  /* --- Semantic aliases --- */\n  --bg: var(--white);\n  --fg: var(--black);\n\n  --text-primary: var(--black);\n  --text-muted: var(--grey-50);\n  --text-disabled: var(--grey-30);\n  --text-inverse: var(--white);\n\n  --surface: var(--white);\n  --surface-inverse: var(--black);\n\n  --line: var(--black);          /* primary hairline */\n  --line-faint: var(--grey-15);  /* secondary hairline */\n\n  /* CTA — the one bold block on any page */\n  --cta-bg: var(--black);\n  --cta-fg: var(--white);\n  --cta-bg-hover: var(--grey-90);\n\n  /* States: status is shown as plain text, not color. */\n  --focus-ring: var(--black);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   YEEZY — Typography\n   One typeface everywhere. Hierarchy through position & spacing,\n   never through weight or size variety. Mostly UPPERCASE caps.\n   ============================================================ */\n\n:root {\n  --font-mono: \"IBM Plex Mono\", ui-monospace, \"SFMono-Regular\", Menlo, monospace;\n  --font: var(--font-mono);\n\n  /* Weights — kept deliberately flat */\n  --fw-light: 300; /* @kind font */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n\n  /* Size scale — small, tight, low-contrast */\n  --fs-micro: 10px;   /* fine print, legal */\n  --fs-xs: 11px;      /* nav, labels, metadata */\n  --fs-sm: 12px;      /* default UI text */\n  --fs-md: 14px;      /* product code, emphasis */\n  --fs-lg: 16px;      /* rare — largest UI text */\n  --fs-xl: 22px;      /* product page price / hero number */\n\n  /* Line height */\n  --lh-tight: 1.1; /* @kind font */\n  --lh-base: 1.4; /* @kind font */\n  --lh-loose: 1.7; /* @kind font */\n\n  /* Letter spacing — the signature wide-caps tracking */\n  --ls-tight: 0; /* @kind font * g,\n   never through weight or size variety. Mostly UPPERCASE caps.\n   ============================================================ */\n\n:root {\n  --font-mono: \"IBM Plex Mono\", ui-monospace, \"SFMono-Regular\", Menlo, monospace;\n  --font: var(--font-mono);\n\n  /* Weights — kept deliberately flat */\n  --fw-light: 300; /* @kind font */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n\n  /* Size scale — small, tight, low-contrast */\n  --fs-micro: 10px;   /* fine print, legal */\n  --fs-xs: 11px;      /* nav, labels, metadata */\n  --fs-sm: 12px;      /* default UI text */\n  --fs-md: 14px;      /* product code, emphasis */\n  --fs-lg: 16px;      /* rare — largest UI text */\n  --fs-xl: 22px;      /* product page price / hero number */\n\n  /* Line height */\n  --lh-tight: 1.1; /* @kind font */\n  --lh-base: 1.4; /* @kind font */\n  --lh-loose: 1.7; /* @kind font */\n\n  /* Letter spacing — the signature wide-caps tracking */\n  --ls-tight: 0; /* @kind font */\n  --ls-base: 0.02em; /* @kind font */\n  --ls-wide: 0.08em; /* @kind font */\n  --ls-wider: 0.16em; /* @kind font */\n\n  /* Casing */\n  --case: uppercase; /* @kind other */\n}\n\n/* ============================================================\n   YEEZY — Spacing, Radius, Shadow, Border\n   8px base unit, generous multiples. Hard edges. No shadows.\n   ============================================================ */\n\n:root {\n  --space-unit: 8px;\n\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 16px;\n  --space-4: 24px;\n  --space-5: 32px;\n  --space-6: 48px;\n  --space-7: 64px;\n  --space-8: 96px;\n  --space-9: 128px;\n\n  /* Hard edges — no rounding anywhere */\n  --radius: 0;\n\n  /* No shadows, no gradients. Depth comes from whitespace. */\n  --shadow: none;\n\n  /* Borders — thin, monoline, black */\n  --border-width: 1px;\n  --border: var(--border-width) solid var(--black);\n  --border-faint: var(--border-width) solid var(--grey-15);\n\n  /* Motion — minimal, no bounce. Opacity & subtle position only. */\n  --ease: cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n}\n\n<\u002Fstyle>\n  <script src=\"1a16312a-bad7-4b31-a25e-396e0e293116\"><\u002Fscript>\n  <script src=\"e985ae18-1bd5-4086-8508-bf96f0c3d5a5\"><\u002Fscript>\n  <script src=\"5ac68a2e-7714-492f-b025-dd7bf6b38efa\"><\u002Fscript>\n  <script src=\"4826bffa-dc8a-4efd-bc5b-58aa19ab6afb\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;padding:0;}\n    body{background:#15171a;font-family:var(--font-mono);-webkit-font-smoothing:antialiased;overflow-x:hidden;}\n    #smooth-content{position:relative;z-index:1;}\n    ::selection{background:#f4f2ee;color:#15171a;}\n    @keyframes yzyblink{0%,55%{opacity:1;}56%,100%{opacity:0.2;}}\n    @keyframes yzypulse{0%,100%{opacity:0.35;}50%{opacity:0.85;}}\n    .yzy-arrow:hover{opacity:0.45 !important;}\n    .yzy-row:hover{opacity:0.5 !important;}\n    .yzy-nav span{cursor:pointer;transition:opacity .15s;}\n    .yzy-nav span:hover{opacity:0.45;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div id=\"viz\" style=\"position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(130% 105% at 50% 64%, #444a51 0%, #2b2f35 38%, #16191c 78%, #101214 100%);\"><\u002Fdiv>\n\n<nav class=\"yzy-nav\" style=\"position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:18px 26px;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#fff;mix-blend-mode:difference;\">\n  <div style=\"font-size:12px;letter-spacing:0.22em;cursor:pointer;\">MONOLITH EDITORIAL<\u002Fdiv>\n  <div style=\"display:flex;gap:30px;\">\n    <span>INDEX<\u002Fspan><span>STUDIO<\u002Fspan><span>ARCHIVE<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"cursor:pointer;\">ENQUIRE<\u002Fdiv>\n<\u002Fnav>\n\n<div id=\"smooth-wrapper\">\n  <div id=\"smooth-content\">\n\n    <section amily:var(--font-mono);font-size:22px;line-height:1;cursor:pointer;transition:opacity .15s;\">›<\u002Fbutton>\n\n      <div style=\"position:absolute;left:0;right:0;bottom:64px;z-index:3;display:flex;justify-content:center;\">\n        <div style=\"font-size:10px;letter-spacing:0.28em;animation:yzypulse 2.4s ease-in-out infinite;\">↓ &nbsp;SCROLL TO ORBIT<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:16px 26px;border-top:1px solid rgba(244,242,238,0.16);font-size:11px;letter-spacing:0.16em;\">\n        <div style=\"flex:1;\">FORM &nbsp;/&nbsp; {{ formName }}<\u002Fdiv>\n        <div style=\"flex:1;text-align:center;opacity:0.6;\">{{ indexLabel }}<\u002Fdiv>\n        <div style=\"flex:1;text-align:right;opacity:0.6;\">AZ <span id=\"azreadout\">000<\u002Fspan>°<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n\n    <section data-screen-label=\"SPEC\" style=\"position:relative;z-index:1;background:var(--white);color:var(--black);font-family:var(--font-mono);text-transform:uppercase;padding:120px 26px 110px;\">\n      <div style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;\">\n        <div>\n          <div style=\"font-size:10px;letter-spacing:0.24em;color:var(--grey-50);\">SPECIMEN<\u002Fdiv>\n          <div style=\"font-size:clamp(40px,6.4vw,78px);line-height:0.94;letter-spacing:-0.01em;font-weight:300;margin-top:18px;\">{{ formCode }}<\u002Fdiv>\n          <div style=\"margin-top:26px;font-size:12px;letter-spacing:0.14em;color:var(--grey-50);max-width:30ch;line-height:1.7;\">CAST FROM A SINGLE POUR. ONE OBJECT, THREE RESOLVED STATES. NO TWO SURFACES REPEAT.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <sc-for list=\"{{ specRows }}\" as=\"row\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--grey-15);font-size:13px;letter-spacing:0.1em;\">\n              <span style=\"color:var(--grey-50);\">{{ row.label }}<\u002Fspan>\n              <span>{{ row.value }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section data-screen-label=\"INDEX\" style=\"position:relative;z-index:1;background:var(--white);color:var(--black);font-family:var(--font-mono);text-transform:uppercase;padding:30px 26px 120px;\">\n      <div style=\"max-width:1180px;margin:0 auto;\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--black);padding-bottom:18px;\">\n          <div style=\"font-size:clamp(26px,3.4vw,40px);font-weight:300;letter-spacing:0.02em;\">THREE STATES<\u002Fdiv>\n          <div style=\"font-size:10px;letter-spacing:0.24em;color:var(--grey-50);\">SELECT TO TRANSFORM<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ formsView }}\" as=\"f\" hint-placeholder-count=\"3\">\n          <div class=\"yzy-row\" onclick=\"{{ f.select }}\" style=\"display:grid;grid-template-columns:80px 1fr auto;align-items:center;gap:24px;padding:28px 0;border-bottom:1px solid var(--grey-15);cursor:pointer;transition:opacity .15s;\">\n            <span style=\"font-size:12px;letter-spacing:0.12em;color:var(--grey-50);\">{{ f.code }}<\u002Fspan>\n            <span style=\"font-size:clamp(20px,2.6vw,30px);font-weight:300;letter-spacing:0.02em;\">{{ f.name }}<\u002Fspan>\n            <span style=\"font-size:11px;letter-spacing:0.14em;\">{{ f.status }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"margin-top:56px;display:flex;justify-content:center;\">\n          <x-import component-from-global-scope=\"YEEZYDesignSystem_7ca9fc.Button\" from=\"49575124-271a-4005-99e2-26adc64cfe7b#/_ds_bundle.js\" size=\"lg\" onclick=\"{{ toTop }}\" hint-size=\"auto,52px\">↑ RETURN TO STUDIO<\u002Fx-import>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <footer data-screen-label=\"FOOTER\" style=\"position:relative;z-index:1;background:var(--black);color:var(--white);font-family:var(--font-mono);text-transform:uppercase;padding:90px 26px 44px;\">\n      <div style=\"max-width:1180px;margin:0 auto;\">\n        <div style=\"font-size:clamp(40px,9vw,128px);line-height:0.82;letter-spacing:0.04em;font-weight:300;\">MONOLITH<br>EDITORIAL<\u002Fdiv>\n        <div style=\"margin-top:64px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:24px;font-size:10px;letter-spacing:0.2em;color:var(--grey-50);\">\n          <span>MONOLITH EDITORIAL — MN SERIES<\u002Fspan>\n          <span>SCROLL · TOUCH · TRANSFORM<\u002Fspan>\n          <span>© 2026<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { idx: 0 };\n\n  forms = [\n    { name: 'MONOLITH', code: 'MN—01', status: 'ACTIVE',\n      rows: [['DIMENSIONS','62 × 150 × 46 CM'],['MASS','410 KG'],['MATERIAL','CAST STONE'],['FINISH','RAW / HEWN'],['EDITION','01 / 03']] },\n    { name: 'SPHERE', code: 'SP—02', status: 'STANDBY',\n      rows: [['DIMENSIONS','Ø 120 CM'],['MASS','384 KG'],['MATERIAL','CAST STONE'],['FINISH','GROUND'],['EDITION','02 / 03']] },\n    { name: 'SHARD', code: 'SH—03', status: 'STANDBY',\n      rows: [['DIMENSIONS','118 × 142 × 110 CM'],['MASS','396 KG'],['MATERIAL','CAST STONE'],['FINISH','FRACTURED'],['EDITION','03 / 03']] },\n  ];\n\n  renderVals() {\n    const i = this.state.idx;\n    const f = this.forms[i];\n    return {\n      formName: f.name,\n      formCode: f.code,\n      indexLabel: String(i + 1).padStart(2, '0') + ' / 03',\n      specRows: f.rows.map(r => ({ label: r[0], value: r[1] })),\n      formsView: this.forms.map((g, k) => ({\n        code: g.code, name: g.name,\n        status: k === i ? 'ACTIVE' : 'STANDBY',\n        select: () => this.selectForm(k),\n      })),\n      prev: () => this.cycle(-1),\n      next: () => this.cycle(1),\n      toTop: () => this.scrollTop(),\n    };\n  }\n\n  cycle(d) {\n    const n = (this.state.idx + d + this.forms.length) % this.forms.length;\n    this.setState({ idx: n });\n    this.morphTo(n);\n  }\n  selectForm(k) {\n    if (k !== this.state.idx) { this.setState({ idx: k }); this.morphTo(k); }\n    this.scrollTop();\n  }\n  scrollTop() {\n    const l = window.__vizLenis || this.lenis;\n    if (l) l.scrollTo(0, { duration: 1.1 });\n    else window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n\n  componentDidMount() {\n    let tries = 0;\n    const wait = () => {\n      if (window.THREE && window.gsap && window.ScrollTrigger && window.Lenis) {\n        this.ensure();\n        // self-heal: if streaming/re-render replaces #viz, rebuild into the new node\n        if (!window.__vizEnsureTimer) {\n          window.__vizEnsureTimer = setInterval(() => this.ensure(), 700);\n        }\n      } else if (tries++ < 200) {\n        setTimeout(wait, 60);\n      } else { console.error('libs failed to load'); }\n    };\n    wait();\n  }\n\n  ensure() {\n    const mount = document.getElementById('viz');\n    if (!mount) return;\n    // already has a live canvas in the CURRENT node — nothing to do\n    if (window.__vizRenderer && window.__vizRenderer.domElement &&\n        window.__vizRenderer.domElement.parentNode === mount) return;\n    try { this.init(); } catch (e) { console.error('viz init error', e); }\n  }\n\n  componentWillUnmount() { /* setup is global + idempotent; leave the live scene running */ }\n\n  cleanupGlobal() {\n    if (window.__vizRaf) { cancelAnimationFrame(window.__vizRaf); window.__vizRaf = null; }\n    if (window.__vizMove) { window.removeEventListener('pointermove', window.__vizMove); window.__vizMove = null; }\n    if (window.__vizResize) { window.removeEventListener('resize', window.__vizResize); window.__vizResize = null; }\n    if (window.__vizTicker && window.gsap) { window.gsap.ticker.remove(window.__vizTicker); window.__vizTicker = null; }\n    if (window.ScrollTrigger) window.ScrollTrigger.getAll().forEach(t => { try { t.kill(); } catch (e) {} });\n    if (window.__vizLenis) { try { window.__vizLenis.destroy(); } catch (e) {} window.__vizLenis = null; }\n    if (window.__vizRenderer) { try { window.__vizRenderer.dispose(); } catch (e) {} window.__vizRenderer = null; }\n    const mount = document.getElementById('viz');\n    if (mount) while (mount.firstChild) mount.removeChild(mount.firstChild);\n  }\n\n  // ---- pseudo 3D value noise ----\n  n3(x, y, z) {\n    return (Math.sin(x * 1.9 + y * 1.3 + z * 0.7)\n      + Math.sin(x * 0.7 - y * 2.1 + z * 1.7)\n      + Math.sin(x * 2.7 + y * 0.9 - z * 1.1)) / 3;\n  }\n\n  buildTargets(geo) {\n    const pos = geo.attributes.position;\n    const n = pos.count;\n    const mono = new Float32Array(n * 3);\n    const sphere = new Float32Array(n * 3);\n    const shard = new Float32Array(n * 3);\n    const v = new THREE.Vector3();\n    for (let k = 0; k < n; k++) {\n      const px = pos.getX(k), py = pos.getY(k), pz = pos.getZ(k);\n      v.set(px, py, pz).normalize();\n      const dx = v.x, dy = v.y, dz = v.z;\n      // --- monolith: real box slab + subtle radial trowel noise (edges stay crisp) ---\n      const rg = this.n3(px * 5, py * 4, pz * 5) * 0.018 + this.n3(px * 11, py * 9, pz * 12) * 0.008;\n      mono[k * 3] = px + dx * rg;\n      mono[k * 3 + 1] = py + dy * rg;\n      mono[k * 3 + 2] = pz + dz * rg;\n      // --- sphere ---\n      const sr = 1.06 + this.n3(dx * 4, dy * 4, dz * 4) * 0.05 + this.n3(dx * 9, dy * 9, dz * 9) * 0.022;\n      sphere[k * 3] = dx * sr;\n      sphere[k * 3 + 1] = dy * sr;\n      sphere[k * 3 + 2] = dz * sr;\n      // --- shard (jagged crystalline) ---\n      const jag = Math.abs(this.n3(dx * 3, dy * 3, dz * 3)) * 0.62\n        + Math.abs(this.n3(dx * 6.5, dy * 6.5, dz * 6.5)) * 0.3;\n      const shr = 0.66 + jag;\n      shard[k * 3] = dx * shr;\n      shard[k * 3 + 1] = dy * shr * 1.2;\n      shard[k * 3 + 2] = dz * shr;\n    }\n    return [mono, sphere, shard];\n  }\n\n  init() {\n    const THREE = window.THREE;\n    const mount = document.getElementById('viz');\n    if (!mount) return;\n    this.cleanupGlobal();\n    const W = window.innerWidth, H = window.innerHeight;\n\n    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(W, H);\n    renderer.shadowMap.enabled = true;\n    renderer.shadowMap.type = THREE.PCFSoftShadowMap;\n    renderer.toneMapping = THREE.ACESFilmicToneMapping;\n    renderer.toneMappingExposure = 1.12;\n    renderer.outputColorSpace = THREE.SRGBColorSpace;\n    mount.appendChild(renderer.domElement);\n    renderer.domElement.style.display = 'block';\n    this.renderer = renderer;\n    window.__vizRenderer = renderer;\n\n    const scene = new THREE.Scene();\n    scene.fog = new THREE.FogExp2(0x15171a, 0.05);\n\n    const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);\n    this.camera = camera;\n    window.__vizCam = camera;\n    this.azStart = 0.42; this.azRange = Math.PI * 1.72;\n    this.updateCam(0);\n\n    // geometry + morph\n    const geo = new THREE.BoxGeometry(1.12, 3.48, 0.84, 26, 78, 20);\n    const targets = this.buildTargets(geo);\n    this.geo = geo; this.targets = targets;\n    window.__vizGeo = geo; window.__vizTargets = targets;\n    const pa = geo.attributes.position;\n    for (let k = 0; k < pa.array.length; k++) pa.array[k] = targets[0][k];\n    pa.needsUpdate = true;\n    geo.computeVertexNormals();\n\n    const mat = new THREE.MeshStandardMaterial({\n      color: 0xe9e6df, roughness: 0.96, metalness: 0.0, flatShading: true,\n    });\n    const mesh = new THREE.Mesh(geo, mat);\n    mesh.castShadow = true; mesh.receiveShadow = false;\n    const group = new THREE.Group();\n    group.add(mesh);\n    scene.add(group);\n    this.group = group; this.mesh = mesh;\n\n    // floor\n    const floor = new THREE.Mesh(\n      new THREE.PlaneGeometry(60, 60),\n      new THREE.MeshStandardMaterial({ color: 0x22262b, roughness: 1, metalness: 0 })\n    );\n    floor.rotation.x = -Math.PI / 2;\n    floor.position.y = -1.5;\n    floor.receiveShadow = true;\n    scene.add(floor);\n\n    // lights — dark studio, one dramatic key\n    scene.add(new THREE.AmbientLight(0x3a4048, 0.55));\n    const fill = new THREE.DirectionalLight(0x8fa6c0, 0.35);\n    fill.position.set(6, 3, -4);\n    scene.add(fill);\n    const key = new THREE.SpotLight(0xfff4e6, 7.5, 0, 0.62, 0.62, 1.1);\n    key.position.set(-5.2, 9, 4.5);\n    key.target.position.set(0, -0.2, 0);\n    key.castShadow = true;\n    key.shadow.mapSize.set(2048, 2048);\n    key.shadow.camera.near = 1; key.shadow.camera.far = 26;\n    key.shadow.bias = -0.0004; key.shadow.radius = 6;\n    scene.add(key); scene.add(key.target);\n    const rim = new THREE.SpotLight(0xc9d6e6, 2.4, 0, 0.7, 0.8, 1.2);\n    rim.position.set(6, 5, -5);\n    rim.target.position.set(0, 0, 0);\n    scene.add(rim); scene.add(rim.target);\n\n    // pointer parallax\n    this.ptr = { x: 0, y: 0, tx: 0, ty: 0 };\n    this._onMove = (e) => {\n      const cx = (e.touches ? e.touches[0].clientX : e.clientX);\n      const cy = (e.touches ? e.touches[0].clientY : e.clientY);\n      this.ptr.tx = (cx / window.innerWidth - 0.5) * 2;\n      this.ptr.ty = (cy / window.innerHeight - 0.5) * 2;\n    };\n    window.addEventListener('pointermove', this._onMove);\n    window.__vizMove = this._onMove;\n\n    this._onResize = () => {\n      const w = window.innerWidth, h = window.innerHeight;\n      camera.aspect = w / h; camera.updateProjectionMatrix();\n      renderer.setSize(w, h);\n    };\n    window.addEventListener('resize', this._onResize);\n    window.__vizResize = this._onResize;\n\n    // GSAP ScrollTrigger + Lenis smooth scroll + pin + orbit\n    const gsap = window.gsap;\n    gsap.registerPlugin(window.ScrollTrigger);\n    const lenis = new window.Lenis({ lerp: 0.085, wheelMultiplier: 1, smoothWheel: true });\n    this.lenis = lenis;\n    window.__vizLenis = lenis;\n    lenis.on('scroll', window.ScrollTrigger.update);\n    this._tickerFn = (time) => { lenis.raf(time * 1000); };\n    window.__vizTicker = this._tickerFn;\n    gsap.ticker.add(this._tickerFn);\n    gsap.ticker.lagSmoothing(0);\n    this.st = window.ScrollTrigger.create({\n      trigger: '#hero', start: 'top top', end: '+=2600',\n      pin: true, scrub: 1,\n      onUpdate: (self) => this.updateCam(self.progress),\n    });\n    window.ScrollTrigger.refresh();\n\n\n    // render loop\n    const clock = new THREE.Clock();\n    const animate = () => {\n      this._raf = requestAnimationFrame(animate);\n      window.__vizRaf = this._raf;\n      const t = clock.getElapsedTime();\n      this.ptr.x += (this.ptr.tx - this.ptr.x) * 0.05;\n      this.ptr.y += (this.ptr.ty - this.ptr.y) * 0.05;\n      group.rotation.y += (this.ptr.x * 0.22 - group.rotation.y) * 0.06;\n      group.rotation.x += (this.ptr.y * 0.10 - group.rotation.x) * 0.06;\n      group.position.y = Math.sin(t * 0.7) * 0.025;\n      renderer.render(scene, camera);\n    };\n    animate();\n  }\n\n  updateCam(p) {\n    const cam = window.__vizCam || this.camera;\n    if (!cam) return;\n    const THREE = window.THREE;\n    const az0 = this.azStart != null ? this.azStart : 0.42;\n    const azR = this.azRange != null ? this.azRange : Math.PI * 1.72;\n    const az = az0 + p * azR;\n    const phi = THREE.MathUtils.lerp(1.34, 1.14, p);\n    const r = THREE.MathUtils.lerp(6.4, 5.5, Math.sin(p * Math.PI));\n    cam.position.set(\n      r * Math.sin(phi) * Math.sin(az),\n      r * Math.cos(phi),\n      r * Math.sin(phi) * Math.cos(az)\n    );\n    cam.lookAt(0, 0.05, 0);\n    const el = document.getElementById('azreadout');\n    if (el) {\n      let deg = Math.round((az * 180 / Math.PI) % 360);\n      if (deg < 0) deg += 360;\n      el.textContent = String(deg).padStart(3, '0');\n    }\n  }\n\n  morphTo(i) {\n    const geo = window.__vizGeo || this.geo;\n    const targets = window.__vizTargets || this.targets;\n    if (!geo || !targets) return;\n    const gsap = window.gsap;\n    const target = targets[i];\n    const arr = geo.attributes.position.array;\n    const start = Float32Array.from(arr);\n    if (this._mp) gsap.killTweensOf(this._mp);\n    this._mp = { t: 0 };\n    gsap.to(this._mp, {\n      t: 1, duration: 1.15, ease: 'power3.inOut',\n      onUpdate: () => {\n        const t = this._mp.t;\n        for (let k = 0; k < arr.length; k++) arr[k] = start[k] + (target[k] - start[k]) * t;\n        geo.attributes.position.needsUpdate = true;\n      },\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
